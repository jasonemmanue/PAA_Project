# ============================================================
# Alembic — configuration des migrations FLUIDIS
# ============================================================
# Référence : https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Chemin vers le répertoire contenant env.py et les scripts de version
script_location = alembic

# Format du nom de fichier généré automatiquement (--autogenerate)
file_template = %%(rev)s_%%(slug)s

# Activer la troncature des noms de fichiers longs
truncate_slug_length = 40

# L'URL de connexion est définie dynamiquement dans alembic/env.py
# à partir de la variable d'environnement DATABASE_URL.
# Ne pas renseigner sqlalchemy.url ici pour éviter d'y stocker des secrets.
sqlalchemy.url =

# Prépend un timestamp aux révisions pour l'ordre lexicographique
# (alternatif à l'utilisation de rev_id séquentiel)
# prepend_rev = true

[post_write_hooks]
# Pas de hook de formatage automatique en P1.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
